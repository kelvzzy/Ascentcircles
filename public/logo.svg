<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer Circle -->
  <circle cx="100" cy="100" r="95" fill="#1a3d3d" stroke="#e8b968" stroke-width="3"/>
  
  <!-- Mountain Silhouette -->
  <path d="M 40 140 L 70 90 L 100 110 L 130 70 L 160 140 Z" fill="#2d5555"/>
  
  <!-- Sun/Sunrise -->
  <circle cx="100" cy="80" r="25" fill="#d97634"/>
  <circle cx="100" cy="80" r="20" fill="#f5a855"/>
  
  <!-- Hikers Silhouette -->
  <g fill="#0f2828">
    <ellipse cx="85" cy="105" rx="6" ry="8"/>
    <rect x="82" y="113" width="6" height="15" rx="2"/>
    <ellipse cx="115" cy="100" rx="6" ry="8"/>
    <rect x="112" y="108" width="6" height="15" rx="2"/>
    <!-- Helping hand -->
    <path d="M 91 108 L 109 103" stroke="#0f2828" stroke-width="3" stroke-linecap="round"/>
  </g>
  
  <!-- Text -->
  <text x="100" y="170" font-family="serif" font-size="16" font-weight="bold" fill="#e8b968" text-anchor="middle">
    THE ASCENT CIRCLE
  </text>
  <text x="100" y="185" font-family="serif" font-size="10" fill="#f5e6c8" text-anchor="middle" font-style="italic">
    We Rise Together
  </text>
</svg>
